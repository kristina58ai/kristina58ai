# ═══════════════════════════════════════════════════════════════
# portfolio.yml — авто-генерация секций карты (PROJECTMAP) из portfolio.yml
# ───────────────────────────────────────────────────────────────
# Правишь portfolio.yml → робот пересобирает созвездие + индекс готовности
# в PROJECTMAP.md / PROJECTMAP.en.md и коммитит изменения обратно.
# Пишет в свой же репо → хватает встроенного GITHUB_TOKEN (PAT не нужен).
# ═══════════════════════════════════════════════════════════════
name: portfolio

on:
  push:
    branches: [main]
    paths:
      - "portfolio.yml"
      - "scripts/gen_portfolio.py"
  workflow_dispatch: {}   # можно запустить вручную

permissions:
  contents: write         # чтобы коммитить обновлённый PROJECTMAP

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Regenerate PROJECTMAP sections
        run: python scripts/gen_portfolio.py .

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain PROJECTMAP.md PROJECTMAP.en.md)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add PROJECTMAP.md PROJECTMAP.en.md
            git commit -m "chore: regenerate portfolio sections from portfolio.yml"
            git push
          else
            echo "No changes — PROJECTMAP already in sync"
          fi
