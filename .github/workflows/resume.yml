# ═══════════════════════════════════════════════════════════════
# resume.yml — сборка resume.pdf из RESUME.md (ADR-010)
# ───────────────────────────────────────────────────────────────
# Правишь RESUME.md → робот пересобирает resume.pdf и коммитит.
# Кириллица: pandoc + xelatex + шрифт DejaVu (Open Question — проверить рендер).
# ═══════════════════════════════════════════════════════════════
name: resume

on:
  push:
    branches: [main]
    paths:
      - "RESUME.md"
      - "scripts/gen_resume.py"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pandoc + xelatex + fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex fonts-dejavu

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build resume.pdf
        run: python scripts/gen_resume.py .

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain resume.pdf)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add resume.pdf
            git commit -m "chore: rebuild resume.pdf from RESUME.md"
            git push
          else
            echo "No changes — resume.pdf already in sync"
          fi
